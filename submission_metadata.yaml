# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) as a development collaborator: reading and
  structuring the JD/spec/signals documents into the jd_spec.py config,
  designing the multi-signal scoring architecture, writing and iterating on
  the feature engineering, honeypot detection, semantic similarity, score
  fusion, and reasoning-generation code, and writing the test suite. All
  empirical decisions (honeypot detection thresholds, feature weights) were
  derived by directly inspecting statistics computed from the released
  100K-candidate pool, not invented or assumed. No candidate data was sent
  to any external LLM API at ranking time -- rank.py makes zero network
  calls; it only uses scikit-learn locally.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal hybrid ranker, fully CPU-local and offline at ranking time.
  Five components feed a weighted score fusion: (1) structured JD-fit
  features -- title/seniority match, trust-weighted must-have skill
  coverage (proficiency x endorsements x duration, to resist keyword
  stuffing), applied-ML career-time fraction, location/relocation fit; (2) a
  local TF-IDF + truncated-SVD (LSA) semantic similarity score against the
  JD text, fit from scratch on the candidate pool (no pretrained embeddings,
  no network); (3) a multiplicative behavioral-signal modifier from
  redrob_signals (recency, recruiter response rate, notice period) so
  availability discounts fit rather than competing with it; (4) a
  multiplicative honeypot/profile-inconsistency penalty from three
  empirically-validated channels (skill duration vs. years of experience,
  expert-with-no-time-invested skills, and free-text-vs-structured YOE
  mismatch); (5) soft disqualifier penalties calibrated to the JD's own
  language ("will not" vs "probably will not move forward") for
  pure-research-only, consulting-only, CV/speech/robotics-only, and
  title-chasing patterns. Every ranked candidate gets a deterministic,
  template-resistant reasoning string built directly from their own profile
  fields -- no LLM call, so it cannot hallucinate. Runtime: ~105 seconds for
  100K candidates on a single CPU core.

